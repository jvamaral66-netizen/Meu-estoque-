<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Controle de estoque, compras, vendas e lucro de produtos de forma rápida e 100% privada." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meu Estoque" />
    
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="manifest" href="manifest.json" />

    <title>Meu Estoque - Gestão de Compras e Vendas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registrado com sucesso:', reg.scope))
            .catch(err => console.log('Falha ao registrar o Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
